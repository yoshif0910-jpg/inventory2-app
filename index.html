<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>在庫管理アプリ</title>
  <script src="https://unpkg.com/html5-qrcode" defer></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f4f6f8; color: #222; }
    .container { max-width: 720px; margin: 0 auto; padding: 16px; }
    .header { margin-bottom: 16px; }
    .header h1 { margin: 0 0 6px; font-size: 28px; }
    .header p { margin: 0; color: #666; font-size: 14px; }
    .card { background: #fff; border-radius: 16px; padding: 16px; box-shadow: 0 4px 14px rgba(0,0,0,0.06); margin-bottom: 16px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat { background: #fff; border-radius: 16px; padding: 14px; box-shadow: 0 4px 14px rgba(0,0,0,0.06); text-align: center; }
    .stat .label { font-size: 12px; color: #666; }
    .stat .value { font-size: 26px; font-weight: bold; margin-top: 6px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: block; font-size: 13px; color: #444; margin-bottom: 6px; font-weight: 600; }
    input, select, button, textarea { width: 100%; border: 1px solid #d8dde3; border-radius: 12px; padding: 12px; font-size: 14px; }
    textarea { min-height: 72px; resize: vertical; }
    button { background: #0f62fe; color: #fff; border: none; font-weight: 700; cursor: pointer; }
    button.secondary { background: #eef2f7; color: #222; }
    button.danger { background: #d93025; }
    .button-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .button-row button { flex: 1; min-width: 110px; }
    .item { border: 1px solid #e5e9ef; border-radius: 16px; padding: 14px; margin-bottom: 12px; }
    .item-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .item h3 { margin: 0 0 6px; font-size: 18px; }
    .badge { display: inline-block; padding: 5px 10px; border-radius: 999px; background: #eef2f7; font-size: 12px; margin-right: 6px; margin-bottom: 6px; }
    .low { background: #ffe5e5; color: #b42318; }
    .price-box { background: #f8fafc; border-radius: 12px; padding: 10px; margin-top: 10px; font-size: 14px; }
    .muted { color: #666; font-size: 13px; }
    #reader { width: 100%; max-width: 360px; margin: 12px auto 0; overflow: hidden; border-radius: 12px; }
    .hidden { display: none; }
    #testResults { margin-top: 8px; white-space: pre-wrap; background: #f8fafc; border-radius: 12px; padding: 10px; }
    #candidateBox { background:#f8fafc; padding:12px; margin-top:10px; box-shadow:none; border:1px solid #e5e9ef; border-radius: 12px; }
    .candidate-title { font-weight: 700; margin-bottom: 8px; }
    @media (max-width: 640px) { .stats, .row { grid-template-columns: 1fr; } .item-top { flex-direction: column; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>在庫管理アプリ</h1>
      <p>バーコード読取対応・最小単位あたり単価表示</p>
    </div>

    <div class="stats">
      <div class="stat"><div class="label">登録商品数</div><div class="value" id="statItems">0</div></div>
      <div class="stat"><div class="label">合計在庫</div><div class="value" id="statStock">0</div></div>
      <div class="stat"><div class="label">買い足し必要</div><div class="value" id="statLow">0</div></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">商品登録・編集</h2>
      <div class="row">
        <div>
          <label for="name">商品名</label>
          <input id="name" placeholder="例：アタックZERO" />
        </div>
        <div>
          <label for="category">分類</label>
          <select id="category" onchange="updateSubCategory()">
            <option>洗剤</option>
            <option>日用品</option>
            <option>食料品</option>
            <option>その他</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div>
          <label for="subCategory">洗剤種類</label>
          <select id="subCategory">
            <option>洗剤</option>
            <option>柔軟剤</option>
            <option>漂白剤</option>
          </select>
        </div>
        <div></div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div>
          <label for="stock">現在庫</label>
          <input id="stock" type="number" value="1" min="0" />
        </div>
        <div>
          <label for="minStock">最低在庫</label>
          <input id="minStock" type="number" value="1" min="0" />
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div>
          <label for="price">価格（円）</label>
          <input id="price" type="number" placeholder="例：2033" min="0" />
        </div>
        <div>
          <label for="volume">内容量</label>
          <input id="volume" type="number" placeholder="例：2000" min="0" />
        </div>
      </div>

      <div class="row" style="margin-top:10px;">
        <div>
          <label for="unitSize">最小単位</label>
          <select id="unitSize">
            <option value="1">1</option>
            <option value="10">10</option>
            <option value="100">100</option>
          </select>
        </div>
        <div>
          <label for="volumeUnit">容量単位</label>
          <select id="volumeUnit">
            <option value="mL">mL</option>
            <option value="g">g</option>
            <option value="個">個</option>
            <option value="枚">枚</option>
          </select>
        </div>
      </div>

      <div style="margin-top:10px;">
        <label for="barcode">バーコード</label>
        <input id="barcode" placeholder="JANコード" oninput="handleBarcodeInput()" />
      </div>

      <div style="margin-top:10px;">
        <label for="memo">メモ</label>
        <textarea id="memo" placeholder="例：無菌レベルの消臭力"></textarea>
      </div>

      <div style="margin-top:10px;">
        <label for="yahooAppId">Yahoo! Client ID</label>
        <input id="yahooAppId" placeholder="Yahoo!デベロッパーのClient IDを入力" oninput="saveYahooAppId()" />
      </div>

      <div class="button-row" style="margin-top:12px;">
        <button onclick="saveItem()">保存する</button>
        <button class="secondary" onclick="startScanner()">バーコード読取</button>
        <button class="secondary" onclick="lookupProductName()">商品名を候補検索</button>
        <button class="secondary" onclick="resetForm()">入力クリア</button>
      </div>

      <div id="candidateBox" class="hidden">
        <div class="candidate-title">候補</div>
        <div id="candidateButtons" class="button-row"></div>
      </div>

      <div id="scannerBox" class="hidden">
        <div id="reader"></div>
        <div class="button-row" style="margin-top:10px;">
          <button class="danger" onclick="stopScanner()">読取を止める</button>
        </div>
        <p class="muted" id="scanMessage">カメラを起動中です</p>
      </div>
      <p class="muted" id="lookupMessage"></p>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">買い物リスト</h2>
      <div id="shoppingList" class="muted">買い足しが必要な商品はありません</div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">在庫一覧</h2>
      <div id="itemList"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0;">自己テスト</h2>
      <div class="button-row"><button class="secondary" onclick="runSelfTests()">テスト実行</button></div>
      <div id="testResults" class="muted">未実行</div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'inventory_html_single_file_v1';
    const LEARNED_BARCODE_KEY = 'inventory_barcode_learning_v3';
    const YAHOO_APP_ID_KEY = 'inventory_yahoo_app_id_v1';
    let items = [];
    let editingId = null;
    let html5QrCode = null;
    let learnedBarcodeMap = {};
    let yahooAppId = '';

    const defaultItems = [
      { id: crypto.randomUUID(), name: 'アタックZERO', category: '洗剤-洗剤', stock: 2, minStock: 1, price: 2033, volume: 2000, unitSize: 1, volumeUnit: 'mL', barcode: '4901301435933', memo: 'アタック液体史上 最高の清潔力' },
      { id: crypto.randomUUID(), name: 'レノア 超消臭1WEEK 極やわ仕上げ', category: '洗剤-柔軟剤', stock: 1, minStock: 1, price: 548, volume: 770, unitSize: 1, volumeUnit: 'mL', barcode: '', memo: '柔軟剤' },
      { id: crypto.randomUUID(), name: 'ワイドハイターEX', category: '洗剤-漂白剤', stock: 1, minStock: 1, price: 1265, volume: 2400, unitSize: 1, volumeUnit: 'mL', barcode: '', memo: '漂白剤' },
      { id: crypto.randomUUID(), name: 'トイレットペーパー', category: '日用品', stock: 1, minStock: 1, price: 698, volume: 12, unitSize: 1, volumeUnit: '個', barcode: '', memo: '12ロール' },
      { id: crypto.randomUUID(), name: 'ティッシュ', category: '日用品', stock: 1, minStock: 1, price: 398, volume: 5, unitSize: 1, volumeUnit: '個', barcode: '', memo: '5箱' },
      { id: crypto.randomUUID(), name: '牛乳', category: '食料品', stock: 1, minStock: 1, price: 218, volume: 1000, unitSize: 100, volumeUnit: 'mL', barcode: '', memo: '1L' },
      { id: crypto.randomUUID(), name: '食パン', category: '食料品', stock: 1, minStock: 1, price: 158, volume: 6, unitSize: 1, volumeUnit: '枚', barcode: '', memo: '6枚切り' }
    ];

    const CATEGORY_DICTIONARY = {
      '洗剤': ['アタックZERO', 'レノア 超消臭1WEEK 極やわ仕上げ', 'ワイドハイターEX', 'レノア クエン酸IN'],
      '日用品': ['トイレットペーパー', 'ティッシュ', 'キッチンペーパー', 'ゴミ袋', 'ラップ'],
      '食料品': ['牛乳', '食パン', 'パスタ', 'ヨーグルト', '卵'],
      'その他': ['その他商品']
    };

    function loadYahooAppId() {
      const saved = localStorage.getItem(YAHOO_APP_ID_KEY);
      yahooAppId = saved || '';
      const input = document.getElementById('yahooAppId');
      if (input) input.value = yahooAppId;
    }

    function saveYahooAppId() {
      yahooAppId = document.getElementById('yahooAppId').value.trim();
      localStorage.setItem(YAHOO_APP_ID_KEY, yahooAppId);
    }

    function loadLearnedBarcodeMap() {
      const saved = localStorage.getItem(LEARNED_BARCODE_KEY);
      if (saved) {
        try {
          learnedBarcodeMap = JSON.parse(saved) || {};
          return;
        } catch (e) {}
      }
      learnedBarcodeMap = {};
    }

    function saveLearnedBarcodeMap() {
      localStorage.setItem(LEARNED_BARCODE_KEY, JSON.stringify(learnedBarcodeMap));
    }

    function loadItems() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        try {
          items = JSON.parse(saved);
          if (Array.isArray(items)) return;
        } catch (e) {}
      }
      items = JSON.parse(JSON.stringify(defaultItems));
      saveItemsToStorage();
    }

    function saveItemsToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function calcUnitPrice(item) {
      const price = Number(item.price);
      const volume = Number(item.volume);
      const unitSize = Number(item.unitSize);
      if (!price || !volume || !unitSize) return '-';
      return ((price / volume) * unitSize).toFixed(2);
    }

    function formatCategory(category) {
      if (!category) return 'その他';
      if (category.includes('-')) {
        const parts = category.split('-');
        return `${parts[0]} (${parts[1]})`;
      }
      return category;
    }

    function normalizeProductName(name) {
      if (!name) return '';
      let normalized = String(name).trim();
      normalized = normalized.replace(/Lenor/ig, 'レノア');
      normalized = normalized.replace(/Attack\s*ZERO/ig, 'アタックZERO');
      normalized = normalized.replace(/Attack/ig, 'アタック');
      normalized = normalized.replace(/Wide\s*Haiter|Haiter/ig, 'ワイドハイターEX');
      normalized = normalized.replace(/citric\s*acid/ig, 'クエン酸IN');
      normalized = normalized.replace(/\s+/g, ' ').trim();
      return normalized;
    }

    function getMainCategory(category) {
      if (!category) return 'その他';
      return category.includes('-') ? category.split('-')[0] : category;
    }

    function getLocalBarcodeMatch(barcode) {
      if (!barcode) return null;
      if (learnedBarcodeMap[barcode]) return learnedBarcodeMap[barcode];
      const matchedItem = items.find((item) => item.barcode === barcode);
      if (!matchedItem) return null;
      return { name: matchedItem.name, category: matchedItem.category, memo: matchedItem.memo || '' };
    }

    function showCandidates(candidates) {
      const box = document.getElementById('candidateBox');
      const area = document.getElementById('candidateButtons');
      area.innerHTML = '';
      if (!candidates || candidates.length === 0) {
        box.classList.add('hidden');
        return;
      }

      const prices = candidates
        .map((candidate) => typeof candidate === 'string' ? null : candidate.price)
        .filter((price) => typeof price === 'number' && !Number.isNaN(price));
      const lowestPrice = prices.length ? Math.min(...prices) : null;

      candidates.forEach((candidate) => {
        const candidateObj = typeof candidate === 'string'
          ? { name: candidate, price: null, source: 'other' }
          : candidate;
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'secondary';

        const isLowest = lowestPrice !== null && candidateObj.price === lowestPrice;
        const priceText = typeof candidateObj.price === 'number' ? ` ¥${candidateObj.price.toLocaleString()}` : '';
        const badge = isLowest ? ' ★最安' : '';
        btn.textContent = `${candidateObj.name}${priceText}${badge}`;
        btn.onclick = () => applyCandidate(candidateObj);
        area.appendChild(btn);
      });
      box.classList.remove('hidden');
    }

    function applyCandidate(candidate) {
      const candidateObj = typeof candidate === 'string'
        ? { name: candidate, price: null, source: 'other' }
        : candidate;
      document.getElementById('name').value = candidateObj.name;
      if (typeof candidateObj.price === 'number' && !document.getElementById('price').value) {
        document.getElementById('price').value = candidateObj.price;
      }
      autoSetCategoryFromName(candidateObj.name);
      document.getElementById('lookupMessage').textContent = '候補を適用しました。保存すると次回から学習済みとして扱います。';
      showCandidates([]);
    }

    function dedupeCandidates(candidates) {
      return [...new Set(candidates.filter(Boolean).map((name) => normalizeProductName(name)).filter(Boolean))];
    }

    function scoreCandidate(name, barcode, source = 'other') {
      const currentCategory = document.getElementById('category').value;
      let score = 0;
      if (!name) return score;

      const existingItem = items.find((item) => item.name === name);
      if (existingItem) score += 40; // APIより少し下
      if (source === 'learned') score += 100; // 最優先

      if (source === 'api') {
        score += 70; // Yahoo/APIを強く優先
        if (/[\u3040-\u30ff\u4e00-\u9faf]/.test(name)) score += 40;
        if (name.length <= 20) score += 20;
        if (/アタック|レノア|ハイター|牛乳|食パン|ティッシュ/.test(name)) score += 30;
      }

      if (CATEGORY_DICTIONARY[currentCategory] && CATEGORY_DICTIONARY[currentCategory].includes(name)) score += 40;
      if (currentCategory === '洗剤' && /アタック|レノア|ハイター/.test(name)) score += 30;
      if (currentCategory === '日用品' && /トイレットペーパー|ティッシュ|キッチンペーパー|ゴミ袋|ラップ/.test(name)) score += 30;
      if (currentCategory === '食料品' && /牛乳|食パン|パスタ|ヨーグルト|卵/.test(name)) score += 30;
      if (barcode && barcode.startsWith('49')) score += 5;

      return score;
    }

    function buildStrongCandidates(barcode, apiCandidates) {
      const currentCategory = document.getElementById('category').value;
      const learned = barcode && learnedBarcodeMap[barcode]
        ? [{ name: learnedBarcodeMap[barcode].name, price: learnedBarcodeMap[barcode].price ?? null, source: 'learned' }]
        : [];
      const existing = items
        .filter((item) => getMainCategory(item.category) === currentCategory)
        .map((item) => ({ name: item.name, price: item.price ?? null, source: 'existing' }));
      const categoryCandidates = (CATEGORY_DICTIONARY[currentCategory] || []).map((name) => ({ name, price: null, source: 'category' }));
      const api = apiCandidates.map((item) => typeof item === 'string' ? ({ name: item, price: null, source: 'api' }) : ({ ...item, source: item.source || 'api' }));

      const mergedRaw = [...learned, ...api, ...existing, ...categoryCandidates];
      const uniqueMap = {};
      mergedRaw.forEach((item) => {
        const key = normalizeProductName(item.name);
        if (!uniqueMap[key]) {
          uniqueMap[key] = { name: key, price: item.price ?? null, source: item.source };
        } else {
          if (uniqueMap[key].price == null && item.price != null) uniqueMap[key].price = item.price;
          if (uniqueMap[key].source !== 'learned' && item.source === 'learned') uniqueMap[key].source = 'learned';
          else if (uniqueMap[key].source === 'category' && item.source !== 'category') uniqueMap[key].source = item.source;
        }
      });

      return Object.values(uniqueMap)
        .map((item) => ({ ...item, score: scoreCandidate(item.name, barcode, item.source) }))
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);
    }

    function autoSetCategoryFromName(name) {
      if (!name) return;
      if (/アタックZERO|アタック/.test(name)) {
        document.getElementById('category').value = '洗剤';
        document.getElementById('subCategory').value = '洗剤';
      } else if (/レノア/.test(name)) {
        document.getElementById('category').value = '洗剤';
        document.getElementById('subCategory').value = '柔軟剤';
      } else if (/ハイター/.test(name)) {
        document.getElementById('category').value = '洗剤';
        document.getElementById('subCategory').value = '漂白剤';
      } else if (/トイレットペーパー|ティッシュ|キッチンペーパー|ゴミ袋|ラップ/.test(name)) {
        document.getElementById('category').value = '日用品';
      } else if (/牛乳|食パン|パスタ|ヨーグルト|卵/.test(name)) {
        document.getElementById('category').value = '食料品';
      }
      updateSubCategory();
    }

    function learnBarcodeMapping(barcode, item) {
      if (!barcode || !item || !item.name) return;
      learnedBarcodeMap[barcode] = { name: item.name, category: item.category, memo: item.memo || '', price: item.price ?? null };
      saveLearnedBarcodeMap();
    }

    function handleBarcodeInput() {
      const barcode = document.getElementById('barcode').value.trim();
      const localMatch = getLocalBarcodeMatch(barcode);
      const message = document.getElementById('lookupMessage');
      if (localMatch) {
        document.getElementById('name').value = localMatch.name || '';
        if (!document.getElementById('memo').value.trim() && localMatch.memo) {
          document.getElementById('memo').value = localMatch.memo;
        }
        autoSetCategoryFromName(localMatch.name || '');
        message.textContent = '学習済みデータから一致しました';
        showCandidates([]);
      } else {
        message.textContent = '';
        showCandidates([]);
      }
    }

    function render() {
      const itemList = document.getElementById('itemList');
      const shoppingList = document.getElementById('shoppingList');
      itemList.innerHTML = '';
      const lowItems = items.filter((item) => Number(item.stock) <= Number(item.minStock));
      const totalStock = items.reduce((sum, item) => sum + Number(item.stock || 0), 0);
      document.getElementById('statItems').textContent = items.length;
      document.getElementById('statStock').textContent = totalStock;
      document.getElementById('statLow').textContent = lowItems.length;

      if (lowItems.length === 0) {
        shoppingList.innerHTML = '<div class="muted">買い足しが必要な商品はありません</div>';
      } else {
        shoppingList.innerHTML = lowItems.map((item) => `<div class="item"><strong>${escapeHtml(item.name)}</strong><br><span class="muted">現在庫 ${item.stock} / 最低在庫 ${item.minStock}</span></div>`).join('');
      }

      const grouped = {};
      items.forEach((item) => {
        let mainCategory = getMainCategory(item.category);

        // 柔軟剤・漂白剤もすべて洗剤にまとめる
        if (mainCategory === '洗剤') {
          mainCategory = '洗剤';
        }
        if (!grouped[mainCategory]) grouped[mainCategory] = [];
        grouped[mainCategory].push(item);
      });

      // カテゴリ順を固定（洗剤を先頭）
      const orderedKeys = Object.keys(grouped).sort((a, b) => (a === '洗剤' ? -1 : 1));
      orderedKeys.forEach((categoryName) => {
        const section = document.createElement('div');
        section.className = 'card';

        const title = document.createElement('h3');
        title.style.marginTop = '0';
        title.textContent = categoryName;
        section.appendChild(title);

        if (categoryName === '洗剤') {
          const list = document.createElement('div');

          grouped[categoryName].forEach((item) => {
            const wrapper = document.createElement('div');
            wrapper.style.padding = '8px 0 14px 0';

            const nameRow = document.createElement('div');
            nameRow.style.padding = '6px 0';
            nameRow.style.fontSize = '18px';
            nameRow.style.fontWeight = '700';
            nameRow.innerHTML = `&emsp;${escapeHtml(item.name)} <span class="muted">在庫 ${item.stock}</span>`;

            const buttonRow = document.createElement('div');
            buttonRow.className = 'button-row';
            buttonRow.style.display = 'grid';
            buttonRow.style.gridTemplateColumns = 'repeat(4, minmax(0, 1fr))';
            buttonRow.style.gap = '8px';
            buttonRow.style.paddingLeft = '24px';
            buttonRow.style.paddingRight = '8px';
            buttonRow.style.marginTop = '4px';

            const useBtn = document.createElement('button');
            useBtn.className = 'secondary';
            useBtn.textContent = '使った';
            useBtn.onclick = () => changeStock(item.id, -1);

            const buyBtn = document.createElement('button');
            buyBtn.textContent = '買った';
            buyBtn.onclick = () => changeStock(item.id, 1);

            const editBtn = document.createElement('button');
            editBtn.className = 'secondary';
            editBtn.textContent = '編集';
            editBtn.onclick = () => editItem(item.id);

            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'danger';
            deleteBtn.textContent = '削除';
            deleteBtn.onclick = () => deleteItem(item.id);

            buttonRow.appendChild(useBtn);
            buttonRow.appendChild(buyBtn);
            buttonRow.appendChild(editBtn);
            buttonRow.appendChild(deleteBtn);

            wrapper.appendChild(nameRow);
            wrapper.appendChild(buttonRow);
            list.appendChild(wrapper);
          });

          section.appendChild(list);
        } else {
          grouped[categoryName].forEach((item) => {
            const low = Number(item.stock) <= Number(item.minStock);
            const unitText = `${item.unitSize}${item.volumeUnit}あたり`;
            const mainCategory = getMainCategory(item.category);
            // 洗剤は小分類を表示しない
            const subLabel = mainCategory !== '洗剤' && item.category.includes('-')
              ? item.category.split('-')[1]
              : '';
            const div = document.createElement('div');
            div.className = 'item';
            div.innerHTML = `
              <div class="item-top">
                <div>
                  <h3>${escapeHtml(item.name)}</h3>
                  ${subLabel ? `<span class="badge">${escapeHtml(subLabel)}</span>` : ''}
                  ${low ? '<span class="badge low">在庫少</span>' : ''}
                </div>
                <div><strong>在庫 ${item.stock}</strong></div>
              </div>
              <div class="price-box">
                <div>価格: ${Number(item.price || 0).toLocaleString()}円</div>
                <div>内容量: ${item.volume || '-'}${item.volumeUnit || ''}</div>
                <div>${unitText}: ${calcUnitPrice(item)}円</div>
                ${item.barcode ? `<div>バーコード: ${escapeHtml(item.barcode)}</div>` : ''}
                ${item.memo ? `<div>メモ: ${escapeHtml(item.memo)}</div>` : ''}
              </div>
              <div class="button-row" style="margin-top:10px;">
                <button class="secondary" onclick="changeStock('${item.id}', -1)">使った</button>
                <button onclick="changeStock('${item.id}', 1)">買った</button>
                <button class="secondary" onclick="editItem('${item.id}')">編集</button>
                <button class="danger" onclick="deleteItem('${item.id}')">削除</button>
              </div>`;
            section.appendChild(div);
          });
        }

        itemList.appendChild(section);
      });
    }

    function getFormData() {
      const category = document.getElementById('category').value;
      const subCategory = document.getElementById('subCategory').value;
      return {
        id: editingId || crypto.randomUUID(),
        name: document.getElementById('name').value.trim(),
        category: category === '洗剤' ? `${category}-${subCategory}` : category,
        stock: Number(document.getElementById('stock').value || 0),
        minStock: Number(document.getElementById('minStock').value || 0),
        price: Number(document.getElementById('price').value || 0),
        volume: Number(document.getElementById('volume').value || 0),
        unitSize: Number(document.getElementById('unitSize').value || 1),
        volumeUnit: document.getElementById('volumeUnit').value,
        barcode: document.getElementById('barcode').value.trim(),
        memo: document.getElementById('memo').value.trim()
      };
    }

    async function fetchApiCandidates(barcode) {
      const candidates = [];

      if (yahooAppId) {
        try {
          const yahooUrl = `https://shopping.yahooapis.jp/ShoppingWebService/V3/itemSearch?appid=${encodeURIComponent(yahooAppId)}&jan_code=${encodeURIComponent(barcode)}&results=5&sort=-score`;
          const yahooResponse = await fetch(yahooUrl, { headers: { Accept: 'application/json' } });
          if (yahooResponse.ok) {
            const yahooData = await yahooResponse.json();
            if (yahooData && Array.isArray(yahooData.hits)) {
              yahooData.hits.forEach((hit) => {
                if (hit && hit.name) {
                  candidates.push({ name: hit.name, price: typeof hit.price === 'number' ? hit.price : null, source: 'api' });
                }
              });
            }
          }
        } catch (e) {}
      }

      try {
        const response = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${encodeURIComponent(barcode)}`, { headers: { Accept: 'application/json' } });
        if (response.ok) {
          const data = await response.json();
          if (data && Array.isArray(data.items)) {
            data.items.forEach((item) => {
              if (item && item.title) {
                candidates.push({ name: item.title, price: null, source: 'api' });
              }
            });
          }
        }
      } catch (e) {}

      try {
        const offResponse = await fetch(`https://world.openfoodfacts.org/api/v2/product/${encodeURIComponent(barcode)}.json`);
        if (offResponse.ok) {
          const offData = await offResponse.json();
          if (offData && offData.product) {
            if (offData.product.product_name) candidates.push({ name: offData.product.product_name, price: null, source: 'api' });
            if (offData.product.product_name_ja) candidates.push({ name: offData.product.product_name_ja, price: null, source: 'api' });
          }
        }
      } catch (e) {}

      const normalizedMap = {};
      candidates.forEach((item) => {
        const key = normalizeProductName(item.name);
        if (!key) return;
        if (!normalizedMap[key]) {
          normalizedMap[key] = { name: key, price: item.price ?? null, source: item.source || 'api' };
        } else if (normalizedMap[key].price == null && item.price != null) {
          normalizedMap[key].price = item.price;
        }
      });
      return Object.values(normalizedMap);
    }

    async function lookupProductName() {
      const barcode = document.getElementById('barcode').value.trim();
      const message = document.getElementById('lookupMessage');
      message.textContent = '';
      if (!barcode) {
        alert('先にバーコードを入力するか、読み取ってください');
        return;
      }

      const localMatch = getLocalBarcodeMatch(barcode);
      if (localMatch) {
        document.getElementById('name').value = localMatch.name || '';
        if (!document.getElementById('memo').value.trim() && localMatch.memo) {
          document.getElementById('memo').value = localMatch.memo;
        }
        autoSetCategoryFromName(localMatch.name || '');
        message.textContent = '学習済みデータから一致しました';
        showCandidates([]);
        return;
      }

      message.textContent = '候補を検索中です…';
      const apiCandidates = await fetchApiCandidates(barcode);
      const strongCandidates = buildStrongCandidates(barcode, apiCandidates);

      if (strongCandidates.length > 0) {
        message.textContent = '候補を表示しました。正しい商品名を選んで保存してください。';
        showCandidates(strongCandidates);
      } else {
        message.textContent = '候補を見つけられませんでした。手入力して保存してください。';
        showCandidates([]);
      }
    }

    function saveItem() {
      const item = getFormData();
      if (!item.name) {
        alert('商品名を入力してください');
        return;
      }

      const index = items.findIndex((x) => x.id === item.id);
      if (index >= 0) {
        items[index] = item;
      } else {
        const duplicateIndex = items.findIndex((x) =>
          x.name === item.name &&
          x.category === item.category &&
          Number(x.volume || 0) === Number(item.volume || 0) &&
          String(x.volumeUnit || '') === String(item.volumeUnit || '')
        );

        if (duplicateIndex >= 0) {
          items[duplicateIndex].stock = Number(items[duplicateIndex].stock || 0) + Number(item.stock || 0 || 1);
          if (!items[duplicateIndex].barcode && item.barcode) items[duplicateIndex].barcode = item.barcode;
          if (!items[duplicateIndex].memo && item.memo) items[duplicateIndex].memo = item.memo;
          if ((!items[duplicateIndex].price || Number(items[duplicateIndex].price) === 0) && item.price) items[duplicateIndex].price = item.price;
          if ((!items[duplicateIndex].minStock || Number(items[duplicateIndex].minStock) === 0) && item.minStock) items[duplicateIndex].minStock = item.minStock;
        } else {
          items.push(item);
        }
      }

      if (item.barcode) learnBarcodeMapping(item.barcode, item);
      saveItemsToStorage();
      resetForm();
      render();
    }

    function editItem(id) {
      const item = items.find((x) => x.id === id);
      if (!item) return;
      editingId = id;
      let category = item.category || '洗剤';
      let sub = 'アタック';
      if (category.includes('-')) {
        const parts = category.split('-');
        category = parts[0];
        sub = parts[1] || 'アタック';
      }
      document.getElementById('name').value = item.name || '';
      document.getElementById('category').value = category;
      document.getElementById('subCategory').value = sub;
      document.getElementById('stock').value = item.stock ?? 0;
      document.getElementById('minStock').value = item.minStock ?? 0;
      document.getElementById('price').value = item.price ?? '';
      document.getElementById('volume').value = item.volume ?? '';
      document.getElementById('unitSize').value = item.unitSize ?? 1;
      document.getElementById('volumeUnit').value = item.volumeUnit || 'mL';
      document.getElementById('barcode').value = item.barcode || '';
      document.getElementById('memo').value = item.memo || '';
      updateSubCategory();
      showCandidates([]);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      editingId = null;
      document.getElementById('name').value = '';
      document.getElementById('category').value = '洗剤';
      document.getElementById('subCategory').value = 'アタック';
      document.getElementById('stock').value = 1;
      document.getElementById('minStock').value = 1;
      document.getElementById('price').value = '';
      document.getElementById('volume').value = '';
      document.getElementById('unitSize').value = '1';
      document.getElementById('volumeUnit').value = 'mL';
      document.getElementById('barcode').value = '';
      document.getElementById('memo').value = '';
      document.getElementById('lookupMessage').textContent = '';
      showCandidates([]);
      updateSubCategory();
    }

    function changeStock(id, amount) {
      const item = items.find((x) => x.id === id);
      if (!item) return;
      item.stock = Math.max(0, Number(item.stock) + amount);
      saveItemsToStorage();
      render();
    }

    function deleteItem(id) {
      if (!confirm('削除しますか？')) return;
      items = items.filter((x) => x.id !== id);
      saveItemsToStorage();
      render();
    }

    async function startScanner() {
      const box = document.getElementById('scannerBox');
      const message = document.getElementById('scanMessage');
      box.classList.remove('hidden');
      message.textContent = 'カメラを起動中です';
      if (typeof Html5Qrcode === 'undefined') {
        message.textContent = 'バーコード読取ライブラリを読み込めませんでした';
        return;
      }
      if (!html5QrCode) html5QrCode = new Html5Qrcode('reader');
      try {
        await html5QrCode.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 250, height: 120 } },
          (decodedText) => {
            document.getElementById('barcode').value = decodedText;
            document.getElementById('lookupMessage').textContent = '読み取り成功。候補検索を押してください。';
            handleBarcodeInput();
            stopScanner();
          },
          () => {}
        );
      } catch (e) {
        message.textContent = 'カメラを開始できません。Chromeで開いてカメラを許可してください';
      }
    }

    async function stopScanner() {
      const box = document.getElementById('scannerBox');
      try {
        if (html5QrCode) {
          await html5QrCode.stop();
          await html5QrCode.clear();
          html5QrCode = null;
        }
      } catch (e) {}
      box.classList.add('hidden');
      document.getElementById('reader').innerHTML = '';
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function updateSubCategory() {
      const category = document.getElementById('category').value;
      document.getElementById('subCategory').disabled = category !== '洗剤';
    }

    function runSelfTests() {
      const results = [];
      function assert(condition, message) {
        if (!condition) throw new Error(message);
        results.push('OK: ' + message);
      }
      try {
        assert(calcUnitPrice({ price: 2000, volume: 2000, unitSize: 1 }) === '1.00', '最小単位あたり単価を正しく計算する');
        assert(calcUnitPrice({ price: 2000, volume: 2000, unitSize: 10 }) === '10.00', '10単位あたり単価を正しく計算する');
        assert(formatCategory('洗剤-柔軟剤') === '洗剤 (柔軟剤)', '分類表示を整形する');
        assert(normalizeProductName('Lenor') === 'レノア', '英字ブランド名を正規化する');
        learnedBarcodeMap = {};
        learnBarcodeMapping('123', { name: 'テスト商品', category: '洗剤-アタック', memo: 'メモ' });
        assert(getLocalBarcodeMatch('123').name === 'テスト商品', '保存学習したバーコードを再利用できる');
        assert(buildStrongCandidates('4900000000000', [{ name: 'アタックZERO', price: 2000, source: 'api' }, { name: '牛乳', price: 220, source: 'api' }]).length <= 3, '候補は最大3件');
        assert(buildStrongCandidates('4900000000000', [{ name: 'アタックZERO', price: 2000, source: 'api' }])[0].name === 'アタックZERO', '有力候補を上位に並べる');
        const pricedCandidates = buildStrongCandidates('4900000000000', [{ name: 'アタックZERO', price: 1800, source: 'api' }, { name: 'レノア クエン酸IN', price: 2000, source: 'api' }]);
        assert(typeof pricedCandidates[0] === 'object', '候補に価格オブジェクトを保持する');
        assert(pricedCandidates.some((c) => typeof c.price === 'number'), '候補に価格情報を含められる');
        assert(typeof fetchApiCandidates === 'function', 'Yahoo API対応の候補取得関数が存在する');
        assert(dedupeCandidates(['A', 'A', 'B']).length === 2, '候補の重複を排除する');
        assert(getMainCategory('洗剤-漂白剤') === '洗剤', '大分類を取り出せる');
        const tempItems = [
          { id: '1', name: 'アタックZERO', category: '洗剤-アタック', stock: 1, volume: 2000, volumeUnit: 'mL' }
        ];
        const duplicateItem = { id: '2', name: 'アタックZERO', category: '洗剤-アタック', stock: 1, volume: 2000, volumeUnit: 'mL' };
        const dupIndex = tempItems.findIndex((x) => x.name === duplicateItem.name && x.category === duplicateItem.category && Number(x.volume || 0) === Number(duplicateItem.volume || 0) && String(x.volumeUnit || '') === String(duplicateItem.volumeUnit || ''));
        assert(dupIndex === 0, '同一商品の判定ができる');
        document.getElementById('testResults').textContent = results.join('\n');
      } catch (error) {
        document.getElementById('testResults').textContent = 'NG: ' + error.message + '\n' + results.join('\n');
      }
    }

    loadYahooAppId();
    loadLearnedBarcodeMap();
    loadItems();
    updateSubCategory();
    render();
    runSelfTests();
  </script>
</body>
